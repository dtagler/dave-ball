# Only send Connection: upgrade for actual WebSocket upgrades, not HTTP polling
map $http_upgrade $connection_upgrade {
    default upgrade;
    '' close;
}

server {
    listen 80;
    server_name localhost;
    server_tokens off;

    root /usr/share/nginx/html;
    index index.html;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' https://cdn.socket.io 'unsafe-inline'; style-src 'self' 'unsafe-inline'; connect-src 'self' ws: wss:; img-src 'self' data:;" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # Serve static files with no-cache for JS/CSS to prevent stale code
    location / {
        try_files $uri $uri/ =404;
    }

    location ~* \.(js|css)$ {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        add_header Expires "0";
    }

    # Diagnostic: proxy backend health check to verify connectivity
    location = /api/health {
        proxy_pass http://${BACKEND_FQDN}/health;
        proxy_http_version 1.1;
        proxy_set_header Host ${BACKEND_FQDN};
        proxy_connect_timeout 5s;
        proxy_read_timeout 5s;
    }

    # Proxy Socket.IO to the backend Container App (internal ingress)
    location /socket.io/ {
        proxy_pass http://${BACKEND_FQDN}/socket.io/;

        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host ${BACKEND_FQDN};
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_buffering off;
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }
}
