services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.prod
    ports:
      - "5000:5000"
    volumes:
      - highscores_data:/app/data
    environment:
      - FLASK_ENV=production
      - FLASK_DEBUG=0
      # IMPORTANT: Set a stable secret key for production.
      # Generate one with: python -c "import secrets; print(secrets.token_hex(32))"
      # Without this, sessions are invalidated on every container restart.
      - SECRET_KEY=${SECRET_KEY:?Set SECRET_KEY in .env or environment}
    restart: always
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.prod
    ports:
      - "8080:80"
    depends_on:
      backend:
        condition: service_healthy
    restart: always
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:80/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s

volumes:
  highscores_data:
